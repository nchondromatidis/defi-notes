<!DOCTYPE html>
<html>
<head>
    <meta name="color-scheme" content="light dark">
    <style>
        :root {
            color-scheme: light;
            --icon-ink: #1e1e1e;
            --icon-ink-muted: #6b7280;
            --icon-ink-faint: #d4d4d8;
            --icon-accent: #005ecb;
            --icon-success: #16a34a;
            --icon-warning: #d97706;
            --icon-error: #dc2626;
            --icon-surface: #e9ecef;
            --icon-surface-accent: #005ecb1a;
        }

        :root.dark {
            color-scheme: dark;
            --icon-ink: #d4d4d8;
            --icon-ink-muted: #9ca3af;
            --icon-ink-faint: #374151;
            --icon-accent: #5599ff;
            --icon-success: #4ade80;
            --icon-warning: #fbbf24;
            --icon-error: #f87171;
            --icon-surface: #2a2a2e;
            --icon-surface-accent: #5599ff1a;
        }

        body {
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        body::before {
            content: "Light Mode";
            font-size: 1.2rem;
            font-weight: bold;
        }

        :root.dark body {
            background-color: #1e1e1e;
            color: #c8c8c8;
        }

        :root.dark body::before {
            content: "Dark Mode";
        }

        button {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #999;
            z-index: 1;
        }

        .svg-container svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <button onclick="toggle()">Toggle Dark/Light</button>
    <div class="svg-container" data-src="logo.svg"></div>
    <div class="svg-container" data-src="structure.svg"></div>
    <div class="svg-container" data-src="architecture.svg"></div>
    <script>
      function toggle() {
        document.documentElement.classList.toggle('dark');
      }

      document.querySelectorAll('.svg-container').forEach(async container => {
        const src = container.dataset.src;
        const res = await fetch(src);
        const text = await res.text();
        container.innerHTML = text;
      });
    </script>
</body>
</html>
